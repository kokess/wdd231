<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurants | Lagos Food Finder</title>
  <meta name="description"
    content="Browse all restaurants listed on Lagos Food Finder. Search, filter by cuisine, and find your perfect Lagos dining experience.">
  <meta name="author" content="Austine Dominic Essien">

  <!-- Open Graph -->
  <meta property="og:title" content="Restaurants | Lagos Food Finder">
  <meta property="og:description"
    content="Browse the full list of restaurants on Lagos Food Finder. Filter by cuisine and location.">
  <meta property="og:image" content="https://kokess.github.io/wdd231/lagosfoods/images/og-image.svg">
  <meta property="og:url" content="https://kokess.github.io/wdd231/lagosfoods/restaurants.html">
  <meta property="og:type" content="website">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Restaurants | Lagos Food Finder">
  <meta name="twitter:description" content="Browse all Lagos restaurants — filter by cuisine, price, and rating.">
  <meta name="twitter:image" content="https://kokess.github.io/wdd231/lagosfoods/images/og-image.svg">

  <link rel="icon" href="images/favicon.ico" type="image/x-icon">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/restaurants.css">

  <script type="module" src="scripts/restaurants.mjs"></script>
</head>

<body>

  <!-- ── Header ── -->
  <header>
    <div class="logo-wrap">
      <span class="logo-icon" aria-hidden="true">🍽</span>
      <h1>Lagos <span>Food</span> Finder</h1>
    </div>
    <button id="menuBtn" aria-label="Toggle navigation" aria-expanded="false">☰</button>
    <nav id="mainNav" aria-label="Main navigation">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="restaurants.html" class="lff-active" aria-current="page">Restaurants</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- ── Page Hero ── -->
  <section class="page-hero" aria-label="Page introduction">
    <h2>🍲 Lagos Restaurants</h2>
    <p>Explore all <strong id="totalCount">16</strong> restaurants — from street food to fine dining.</p>
  </section>

  <main>

    <!-- ── Controls ── -->
    <div class="controls" role="search" aria-label="Filter and search restaurants">
      <label for="searchInput" class="sr-only">Search restaurants</label>
      <input type="search" id="searchInput" placeholder="🔍 Search name, cuisine, or location…" autocomplete="off">

      <label for="cuisineFilter" class="sr-only">Filter by cuisine</label>
      <select id="cuisineFilter" aria-label="Filter by cuisine">
        <option value="">All Cuisines</option>
        <option value="Nigerian">Nigerian</option>
        <option value="Yoruba">Yoruba</option>
        <option value="Igbo">Igbo</option>
        <option value="Northern Nigerian">Northern Nigerian</option>
        <option value="Seafood">Seafood</option>
        <option value="Fast Food">Fast Food</option>
        <option value="International">International</option>
        <option value="Pan-Asian">Pan-Asian</option>
      </select>

      <label for="sortFilter" class="sr-only">Sort restaurants</label>
      <select id="sortFilter" aria-label="Sort restaurants">
        <option value="rating">⭐ Highest Rated</option>
        <option value="name">🔤 A–Z</option>
        <option value="price-low">💰 Price: Low</option>
        <option value="price-high">💸 Price: High</option>
      </select>

      <span class="results-count" id="resultsCount" aria-live="polite">16 restaurants</span>
    </div>

    <!-- ── Favourites toggle ── -->
    <div class="fav-toggle-wrap">
      <button class="lff-btn lff-btn-outline" id="favToggle" aria-pressed="false">♡ Show Favourites Only</button>
    </div>

    <!-- ── Restaurant Grid ── -->
    <div id="restaurantGrid" aria-label="Restaurant listings">
      <!-- JS populated -->
    </div>

  </main>

  <!-- ── Modal ── -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Restaurant Details</h3>
        <button class="modal-close" id="modalClose" aria-label="Close modal">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- ── Footer ── -->
  <footer>
    <div class="lff-footer-links">
      <a href="index.html">Home</a>
      <a href="restaurants.html">Restaurants</a>
      <a href="contact.html">Contact</a>
      <a href="attributions.html">Attributions</a>
      <a href="https://www.youtube.com" target="_blank" rel="noopener">📹 Video Demo</a>
    </div>
    <p>&copy; <span id="year"></span> Lagos Food Finder | WDD 231 | Austine Dominic Essien</p>
  </footer>

</body>

</html>
